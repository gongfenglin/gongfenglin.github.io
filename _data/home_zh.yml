interests:
  title: 研究方向
  items:
  - "AI Agent 与评估：关注 verification-first 的编码 Agent、记忆、子 Agent 和可复现评测门禁。"
  - "LLM 基础设施：关注 provider 集成、工具调用可靠性、文档转换和断言工作流。"
  - "智能交通：关注交通流预测、校园导航和数据驱动的交通系统。"

