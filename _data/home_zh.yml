interests:
  title: 研究方向
  items:
  - "自主 AI Agent：围绕 omni-agent、glaude-vibe-coder，关注 verification-native 编码 Agent、记忆、子 Agent、模型配置与可视化工作流。"
  - "大模型评估与可靠性：结合 promptfoo 和 swarm-eval-lab，关注 provider-level xfail、XPASS 报告、断言工作流与可复现 Agent benchmark。"
  - "开源 AI 基础设施：结合 pydantic-ai 和 deepset Haystack 贡献，关注工具调用可靠性、provider 集成、文档转换和异步任务管线。"
  - "跨学科兴趣：心理学（依恋、人格与群体）、法律、生物科学与化学物质合成。"

open_source:
  title: 代表性开源贡献
  items:
  - title: "Pydantic AI：修复 Anthropic 工具结果续聊问题"
    meta: "已合并 PR #5568 · 2026 年 5 月"
    url: "https://github.com/pydantic/pydantic-ai/pull/5568"
    description: "修复继续对话时 Anthropic code-execution 工具结果可能被丢弃的问题。"
  - title: "Haystack integrations：pgvector 检索排序修复"
    meta: "已合并 PR #3370 · 2026 年 6 月"
    url: "https://github.com/deepset-ai/haystack-core-integrations/pull/3370"
    description: "调整 pgvector 检索排序逻辑，使 PostgreSQL 更好地使用向量索引友好的距离算子。"
  - title: "Haystack integrations：Docling 异步任务模式"
    meta: "已合并 PR #3371 · 2026 年 6 月"
    url: "https://github.com/deepset-ai/haystack-core-integrations/pull/3371"
    description: "为 Docling Serve converter 添加异步 job mode 支持。"
  - title: "promptfoo：provider 级 expected failure"
    meta: "开放 PR #9338"
    url: "https://github.com/promptfoo/promptfoo/pull/9338"
    description: "提出 provider 级 xfail、XPASS 报告、UI 展示与文档更新。"

