interests:
  title: Research Interests
  items:
  - "Autonomous AI agents: verification-native coding agents, memory, sub-agents, model profiles, and visual agent workflows."
  - "LLM evaluation and reliability: provider-level expected failures, XPASS reporting, assertion workflows, and reproducible agent benchmarks."
  - "Open-source AI infrastructure: reliable tool-use, provider integrations, document conversion, and async pipelines across pydantic-ai and Haystack."
  - "Interdisciplinary interests: psychology (attachment, personality, and group dynamics), law, biological sciences, and chemical synthesis."

open_source:
  title: Selected Open-Source Contributions
  items:
