  - title: "promptfoo: provider-level expected failures"
    meta: "Open PR #9338"
    url: "https://github.com/promptfoo/promptfoo/pull/9338"
    description: "Proposes provider-level xfail support, XPASS reporting, UI display, and documentation updates."

