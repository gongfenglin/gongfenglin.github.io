interests:
  title: Research Interests
  items:
  - "AI agents and evaluation: verification-first coding agents, memory, sub-agents, and reproducible eval gates."
  - "LLM infrastructure: provider integrations, tool-use reliability, document conversion, and assertion workflows."
  - "Intelligent transportation: traffic-flow forecasting, campus navigation, and data-driven transport systems."

