    meta: "Merged PR #5568 · May 2026"
    url: "https://github.com/pydantic/pydantic-ai/pull/5568"
    description: "Fixed an issue where Anthropic code-execution tool results could be dropped when continuing a conversation."
  - title: "Haystack integrations: pgvector retrieval ordering"
    meta: "Merged PR #3370 · June 2026"
    url: "https://github.com/deepset-ai/haystack-core-integrations/pull/3370"
    description: "Improved pgvector retrieval ordering so PostgreSQL can use vector-index-friendly distance operators."
  - title: "Haystack integrations: Docling async job mode"
    meta: "Merged PR #3371 · June 2026"
    url: "https://github.com/deepset-ai/haystack-core-integrations/pull/3371"
