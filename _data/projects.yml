    items:
      - title: "Pydantic AI Anthropic tool-result continuation fix"
        url: "https://github.com/pydantic/pydantic-ai/pull/5568"
        link_label_en: "Pull Request"
        link_label_zh: "Pull Request"
        meta_en: "Merged PR #5568 · May 2026"
        meta_zh: "已合并 PR #5568 · 2026 年 5 月"
        tags_en: ["Agent Framework", "Tool Use", "Bug Fix"]
        tags_zh: ["Agent 框架", "工具调用", "Bug 修复"]
        description_en: "Fixed an AnthropicModel continuation bug where bash and text-editor code-execution tool results could be dropped from conversation history."
        description_zh: "修复 AnthropicModel 续聊时 bash 与 text-editor code-execution 工具结果可能从历史消息中丢失的问题。"
      - title: "Haystack Docling async job mode"
        url: "https://github.com/deepset-ai/haystack-core-integrations/pull/3371"
        link_label_en: "Pull Request"
        link_label_zh: "Pull Request"
        meta_en: "Merged PR #3371 · June 2026"
        meta_zh: "已合并 PR #3371 · 2026 年 6 月"
        tags_en: ["Document AI", "Async Pipeline", "Integration"]
        tags_zh: ["文档 AI", "异步管线", "集成"]
        description_en: "Added async job mode support to the Docling Serve converter integration, improving document-conversion workflows in Haystack."
        description_zh: "为 Haystack 的 Docling Serve converter 集成添加异步 job mode，提升文档转换工作流能力。"
      - title: "Haystack pgvector retrieval ordering"
        url: "https://github.com/deepset-ai/haystack-core-integrations/pull/3370"
        link_label_en: "Pull Request"
        link_label_zh: "Pull Request"
        meta_en: "Merged PR #3370 · June 2026"
        meta_zh: "已合并 PR #3370 · 2026 年 6 月"
        tags_en: ["Vector Search", "PostgreSQL", "Retrieval"]
        tags_zh: ["向量检索", "PostgreSQL", "召回"]
        description_en: "Fixed pgvector retrieval ordering so PostgreSQL can use vector-index-friendly distance operators for embedding search."
        description_zh: "修复 pgvector 检索排序逻辑，使 PostgreSQL 可以更好地使用向量索引友好的距离算子。"

