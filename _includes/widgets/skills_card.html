{% assign skills = site.data.skills %}

<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4">
                {% if page.lang == "zh" %}
                <h2 class="h5 mb-3"><i class="fas fa-screwdriver-wrench"></i> {{ skills.title_zh }}</h2>
                <ul class="mb-0 pl-3">
                    {% for item in skills.items %}
                    <li class="mb-2">{{ item.zh }}</li>
                    {% endfor %}
                </ul>
                {% else %}
                <h2 class="h5 mb-3"><i class="fas fa-screwdriver-wrench"></i> {{ skills.title_en }}</h2>
                <ul class="mb-0 pl-3">
                    {% for item in skills.items %}
                    <li class="mb-2">{{ item.en }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
        </div>
    </div>
</div>
